<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <form id="loginForm">
        <div class="row mb-3">
            <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4">
            </div>
            <div class="col-md-6">
                <label for="inputPassword4" class="form-label">Password</label>
                <input type="password" class="form-control" id="inputPassword4">
            </div>
        </div>

        <div class="mb-3">
            <label for="inputAddress" class="form-label">Address</label>
            <input type="text" class="form-control" id="inputAddress">
        </div>

        <div class="mb-3">
            <label for="inputAddress2" class="form-label">Address 2</label>
            <input type="text" class="form-control" id="inputAddress2">
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="inputCity" class="form-label">City</label>
                <input type="text" class="form-control" id="inputCity">
            </div>
            <div class="col-md-4">
                <label for="inputState" class="form-label">State</label>
                <select id="inputState" class="form-select">
                    <option selected>Choose...</option>
                    <option>New York</option>
                </select>
            </div>
            <div class="col-md-2">
                <label for="inputZip" class="form-label">Zip</label>
                <input type="text" class="form-control" id="inputZip">
            </div>
        </div>

        <button type="button" onclick="submitData(event)" class="btn btn-primary">Sign in</button>
        <button type="button" onclick="check()" class="btn btn-secondary">Check Users</button>
    </form>
</div>

<script>
    const API_URL = "http://localhost:5000";

    async function submitData(event) {
        event.preventDefault();
        
        const data = {
            emailid: document.getElementById("inputEmail4").value,
            password: document.getElementById("inputPassword4").value,
            address: document.getElementById("inputAddress").value
        };

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            
            const result = await res.json();
            console.log("Success:", result);
        } catch (err) {
            console.error("Fetch Error:", err.message);
            alert("Could not connect to the server.");
        }
    }

    async function check() {
        try {
            const res = await fetch(`${API_URL}/users`);
            const data = await res.json();
            console.log("Users List:", data);
        } catch (err) {
            console.error("Error fetching users:", err);
        }
    }
</script>
</body>
</html>
